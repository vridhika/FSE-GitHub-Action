name: My First Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'   

      - name: Display Node version
        run: node -v

      - name: Starting test
        run: npm run test

      - name: List files
        run: ls

      - name: Print Name
        run: echo "Vridhika"

  say-bye:
    runs-on: ubuntu-latest  
    needs: say-hello

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Goodbye
        run: echo "Goodbye"